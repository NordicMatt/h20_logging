# Radio core: STM logging frontend only. Logs are written to its STMESP and
# forwarded by the application core, so this core needs no UART of its own.

CONFIG_UART_CONSOLE=n

# STM logging frontend (dictionary mode), from the nordic-log-stm-dict snippet.
CONFIG_TEST_LOGGING_DEFAULTS=n
CONFIG_LOG_FRONTEND=y
CONFIG_LOG_FRONTEND_ONLY=y
CONFIG_LOG_FRONTEND_STMESP=y

# The application core prints the boot banner for the whole system.
CONFIG_NCS_BOOT_BANNER=n
CONFIG_BOOT_BANNER=n
