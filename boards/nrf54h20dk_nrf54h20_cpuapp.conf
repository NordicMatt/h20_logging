# Application core = STM logging frontend + ETR proxy.
# It collects the multiplexed trace data from all cores and streams it out over
# its console UART (uart136 -> DK VCOM).

# STM logging frontend (standalone mode), from the nordic-log-stm snippet.
# The application core decodes ETR data and prints human-readable logs on UART.
CONFIG_TEST_LOGGING_DEFAULTS=n
CONFIG_LOG_FRONTEND=y
CONFIG_LOG_FRONTEND_ONLY=y
CONFIG_LOG_FRONTEND_STMESP=y
CONFIG_LOG_FRONTEND_STMESP_GUARANTEED_ACCESS=y
CONFIG_LOG_FRONTEND_STMESP_FSC=y

# ETR proxy: drain the trace buffer and forward decoded logs over UART.
CONFIG_DEBUG_DRIVER=y
CONFIG_UART_ASYNC_API=y

# Boot the Radio core so its logs are produced and forwarded too.
CONFIG_SOC_NRF54H20_CPURAD_ENABLE=y
